steps:
  # Step 1: Install frontend dependencies
  - name: 'node:18-alpine'
    entrypoint: 'npm'
    args: ['ci']
    dir: '.'
    
  # Step 2: Build frontend
  - name: 'node:18-alpine'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: '.'
    
  # Step 3: Install backend dependencies
  - name: 'node:18-alpine'
    entrypoint: 'npm'
    args: ['ci', '--only=production']
    dir: 'backend'
    
  # Step 4: Copy built frontend to backend public directory
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p backend/public/dist
        cp -r dist/* backend/public/dist/
        
  # Step 5: Deploy to App Engine
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['app', 'deploy', '--quiet']
    
# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  
# Timeout for the entire build
timeout: '1200s'

# Substitutions for environment variables
substitutions:
  _SERVICE_NAME: 'jamz-fun'
  _REGION: 'us-central1'
