name: Deploy to Google Cloud App Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAE_SERVICE: default

jobs:
  deploy:
    name: Deploy to App Engine
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install frontend dependencies
      run: npm ci
      
    - name: Build frontend
      run: npm run build
      
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci --only=production
        
    - name: Copy frontend build to backend
      run: |
        mkdir -p backend/public/dist
        cp -r dist/* backend/public/dist/
        
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        
    - name: Configure environment variables
      run: |
        gcloud app deploy --set-env-vars="MONGODB_URI=${{ secrets.MONGODB_URI }},JWT_SECRET=${{ secrets.JWT_SECRET }},MAGIC_SECRET_KEY=${{ secrets.MAGIC_SECRET_KEY }},NODE_ENV=production" --no-promote --quiet
        
    - name: Deploy to App Engine
      run: gcloud app deploy --quiet
      
    - name: Promote to live traffic
      run: gcloud app services set-traffic default --splits=$(gcloud app versions list --service=default --sort-by=~version.createTime --limit=1 --format="value(version.id)")=100
